<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inventario y Ventas (Nube)</title>
    <!-- Incluimos la librería oficial de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 30px; background-color: #f0f2f5; color: #333; position: relative; }
        h1 { color: #1e293b; text-align: center; margin-bottom: 30px; padding-right: 200px; }
        h2, h3 { color: #334155; margin-top: 0; }
        
        .section { background: white; padding: 25px; margin-bottom: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .admin-only { display: none; background-color: #fef08a; border-left: 6px solid #eab308; padding: 20px; margin-top: 15px; border-radius: 6px; }
        .admin-section { display: none; }
        .register-section { display: none; }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; }
        
        label { margin-top: 8px; font-weight: 600; font-size: 14px; color: #475569; }
        input, select { padding: 10px; margin-top: 5px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; width: 100%; box-sizing: border-box; }
        
        button { background-color: #2563eb; color: white; border: none; padding: 12px 20px; font-size: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s; width: 100%; max-width: 250px; margin-top: 15px; }
        button:hover { background-color: #1d4ed8; }
        .btn-success { background-color: #10b981; }
        .btn-success:hover { background-color: #059669; }
        .btn-danger { background-color: #ef4444; padding: 6px 12px; font-size: 13px; width: auto; margin-top: 0; }
        .btn-pdf { background-color: #ea580c; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f8fafc; color: #64748b; font-weight: 600; }

        .kpi-container { position: absolute; top: 20px; right: 30px; z-index: 10; display: flex; gap: 10px; }
        .kpi-card { background: #eff6ff; border: 1px solid #bfdbfe; padding: 10px 15px; border-radius: 8px; text-align: center; }
        .kpi-value { font-size: 20px; font-weight: bold; color: #1e40af; }
        .kpi-sales { background: #ecfdf5; border-color: #a7f3d0; }
        .kpi-sales .kpi-value { color: #065f46; }

        /* Indicador de Conexión */
        .status-badge { color: white; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 15px; }
        .status-online { background-color: #10b981; }
        .status-offline { background-color: #ef4444; }

        .ticket-strip { background: #fff; border: 2px dashed #cbd5e1; padding: 20px; max-width: 400px; margin: 20px auto; font-family: 'Courier New', monospace; }
        .ticket-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; }
    </style>
</head>
<body>

    <div class="kpi-container">
        <div class="kpi-card">
            <div>Productos Totales</div>
            <div id="totalProductosGlobal" class="kpi-value">0</div>
        </div>
        <div class="kpi-card kpi-sales">
            <div>Ventas del Día</div>
            <div id="totalVentasGlobal" class="kpi-value">$0.00</div>
        </div>
    </div>

    <h1>Sistema de Gestión en la Nube</h1>

    <div class="section" id="authSection">
        <!-- Badge dinámico para saber si está conectado a Supabase -->
        <div id="connectionStatus" class="status-badge status-offline">Verificando conexión con la nube...</div>
        
        <h2 id="authTitle">Control de Acceso</h2>
        
        <div id="loginForm">
            <div class="form-grid">
                <div class="form-group">
                    <label>Usuario / Vendedor:</label>
                    <input type="text" id="loginEmail" placeholder="Ej: admin o vendedor1">
                </div>
                <div class="form-group">
                    <label>Contraseña:</label>
                    <input type="password" id="loginPass">
                </div>
            </div>
            <button type="button" onclick="iniciarSesion()">Iniciar Sesión</button>
        </div>

        <div id="userInfoView" style="display: none;">
            <p style="font-size: 16px;">Sesión activa en la nube: <strong id="currentUserName">--</strong></p>
            <button type="button" class="btn-danger" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
    </div>

    <div id="mainSystemContainer" style="display: none;">
        <!-- Módulo de Ventas -->
        <div class="section">
            <h2>Módulo de Ventas</h2>
            <form id="salesForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Producto a Vender:</label>
                        <input type="text" id="saleProductoBusqueda" list="listaProductosDatalist" oninput="mostrarPrecioVenta()" placeholder="Escribe código o nombre...">
                        <datalist id="listaProductosDatalist"></datalist>
                    </div>
                    <div class="form-group">
                        <label>Precio:</label>
                        <input type="text" id="salePrecioDisplay" readonly placeholder="$0.00">
                    </div>
                </div>
                <button type="button" class="btn-success" onclick="procesarVentaNube()">Procesar Venta en Línea</button>
            </form>
        </div>

        <div class="section">
            <h2>Inventario Sincronizado</h2>
            <table>
                <thead>
                    <tr><th>Código</th><th>Nombre</th><th>Marca</th><th>Precio</th><th>Cantidad</th></tr>
                </thead>
                <tbody id="inventoryTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURACIÓN DE TU BASE DE DATOS EN LÍNEA (MODIFICADO)
        // ==========================================
        const SUPABASE_URL = "https://hctkcqjizncmtunuqooyc.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjdGtjcWpoemNtdHVudXFvb3ljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MjgyNzgsImV4cCI6MjA5OTIwNDI3OH0.iBJPJNyT-4Tv2ju0I8Dp4wz7lcwbQePYJHcHePQmaj4";

        let supabaseClient = null;
        let inventarioGlobal = [];
        let usuarioLogueado = null;

        // Inicializar conexión automáticamente
        if(SUPABASE_URL !== "TU_SUPABASE_URL") {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            verificarConexion();
        }

        async function verificarConexion() {
            const statusBadge = document.getElementById('connectionStatus');
            try {
                // Hacemos una consulta rápida de prueba a tu tabla 'inventario'
                let { data, error } = await supabaseClient.from('inventario').select('codigo').limit(1);
                if (error) throw error;
                
                statusBadge.innerText = "🌐 Conectado con Éxito a la Nube";
                statusBadge.className = "status-badge status-online";
            } catch (err) {
                statusBadge.innerText = "❌ Error de Conexión: Revisa credenciales o CORS";
                statusBadge.className = "status-badge status-offline";
                console.error("Detalle del error:", err);
            }
        }

        // Validación manual buscando directamente en tu tabla personalizada 'usuarios'
        async function iniciarSesion() {
            const userIn = document.getElementById('loginEmail').value.trim();
            const passIn = document.getElementById('loginPass').value.trim();

            if(!userIn || !passIn) {
                alert("Por favor completa todos los campos.");
                return;
            }

            try {
                let { data, error } = await supabaseClient
                    .from('usuarios')
                    .select('*')
                    .eq('username', userIn)
                    .eq('password', passIn)
                    .single();

                if (error || !data) {
                    alert("Usuario o contraseña incorrectos en la base de datos.");
                    return;
                }

                usuarioLogueado = data;

                alert("¡Sesión iniciada en línea!");
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('userInfoView').style.display = 'block';
                document.getElementById('mainSystemContainer').style.display = 'block';
                document.getElementById('currentUserName').innerText = usuarioLogueado.username;
                
                cargarDatosNube();
            } catch (error) {
                alert("Error de autenticación: " + error.message);
            }
        }

        async function cargarDatosNube() {
            if(!supabaseClient) return;
            
            // 1. Traer Inventario desde internet
            let { data: prodData, error: prodErr } = await supabaseClient.from('inventario').select('*');
            if(!prodErr && prodData) {
                inventarioGlobal = prodData;
                renderizarTablaGeneral(prodData);
                actualizarDatalistVentas(prodData);
                
                // Actualizar KPI total productos
                let totalStock = prodData.reduce((acc, p) => acc + (parseInt(p.cantidad) || 0), 0);
                document.getElementById('totalProductosGlobal').innerText = totalStock;
            }

            // 2. Traer Ventas del día actual e ingresar el total al KPI
            let hoy = new Date().toLocaleDateString();
            let { data: ventasData, error: ventasErr } = await supabaseClient.from('ventas').select('monto_pagado').eq('fecha_corta', hoy);
            if(!ventasErr && ventasData) {
                let totalDinero = ventasData.reduce((acc, v) => acc + (parseFloat(v.monto_pagado) || 0), 0);
                document.getElementById('totalVentasGlobal').innerText = `$${totalDinero.toFixed(2)}`;
            }
        }

        function renderizarTablaGeneral(productos) {
            const tbody = document.getElementById('inventoryTableBody');
            tbody.innerHTML = '';
            productos.forEach(prod => {
                tbody.innerHTML += `
                    <tr>
                        <td>${prod.codigo}</td>
                        <td>${prod.nombre}</td>
                        <td>${prod.marca || 'N/A'}</td>
                        <td>$${parseFloat(prod.precio).toFixed(2)}</td>
                        <td style="font-weight:bold; color:${prod.cantidad <= 0 ? 'red':'black'}">${prod.cantidad} u.</td>
                    </tr>
                `;
            });
        }

        function actualizarDatalistVentas(productos) {
            const datalist = document.getElementById('listaProductosDatalist');
            datalist.innerHTML = '';
            productos.forEach(p => {
                if(p.cantidad > 0) {
                    let opt = document.createElement('option');
                    opt.value = `[${p.codigo}] ${p.nombre}`;
                    datalist.appendChild(opt);
                }
            });
        }

        function mostrarPrecioVenta() {
            const valorBusqueda = document.getElementById('saleProductoBusqueda').value;
            const prod = inventarioGlobal.find(p => `[${p.codigo}] ${p.nombre}` === valorBusqueda);
            document.getElementById('salePrecioDisplay').value = prod ? `$${parseFloat(prod.precio).toFixed(2)}` : "";
        }

        async function procesarVentaNube() {
            const valorBusqueda = document.getElementById('saleProductoBusqueda').value;
            const prod = inventarioGlobal.find(p => `[${p.codigo}] ${p.nombre}` === valorBusqueda);

            if(!prod) {
                alert("Selecciona un producto válido del buscador.");
                return;
            }

            if(prod.cantidad <= 0) {
                alert("Este producto no tiene existencias disponibles.");
                return;
            }

            let ahora = new Date();

            // 1. Descontar 1 del Stock en la tabla inventario
            const { error: stockErr } = await supabaseClient
                .from('inventario')
                .update({ cantidad: prod.cantidad - 1 })
                .eq('codigo', prod.codigo);

            if(stockErr) {
                alert("Error actualizando inventario: " + stockErr.message);
                return;
            }

            // 2. Registrar venta en la tabla ventas
            const { error: ventaErr } = await supabaseClient.from('ventas').insert({
                codigo: prod.codigo,
                nombre: prod.nombre,
                monto_pagado: parseFloat(prod.precio),
                fecha_corta: ahora.toLocaleDateString(),
                vendedor: usuarioLogueado ? usuarioLogueado.username : "Desconocido"
            });

            if(ventaErr) {
                alert("Venta descontada, pero falló el registro en historial: " + ventaErr.message);
            } else {
                alert("¡Venta procesada y sincronizada en la nube!");
                document.getElementById('salesForm').reset();
                document.getElementById('salePrecioDisplay').value = "";
                cargarDatosNube(); 
            }
        }

        function cerrarSesion() {
            usuarioLogueado = null;
            window.location.reload();
        }
    </script>
</body>
</html>
